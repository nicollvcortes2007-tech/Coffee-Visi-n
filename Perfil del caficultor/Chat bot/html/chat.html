<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/chat.css">
    <title>CHATBOT</title>
</head>
<body>
    <aside class="barra-lateral">
        <header>
            <img class="logoimagen" src="image/logo2.png" alt="logo">
        </header>

        <nav>
            <p class="etiqueta-menu">HACER</p>
            <ul>
                <li class="activo">Chat de IA</li>
            </ul>

            <p class="etiqueta-menu">PRINCIPAL</p>
            <ul>
                <li>Galería</li>
                <li>Favoritos</li>

            </ul>
        </nav>

        <footer class="usuario-info">
            <p>Jose Martiñez/p>
            <span>josemartinez@gmail.com</span>
        </footer>
    </aside>

    <!-- Contenido principal -->
    <main class="contenido-principal">
        <header class="cabecera-superior">
            <section>
                <h2></h2>
                <p></p>
            </section>
        </header>

        <article class="seccion-bienvenida">
            <h3>Bienvenido al Chat de Coffe+Vision</h3>
            <p>La ayuda que necesitas</p>

                <button>Buscar fertilizantes</button>
            </section>
        </article>

        <section class="contenedor-entrada">
            <textarea placeholder="¿Qué deseas saber hoy?"></textarea>
            <nav class="acciones-entrada">
                <ul>
                    <li>Adjuntar</li>
                </ul>
                <button class="boton-enviar">Enviar</button>
            </nav>
        </section>
