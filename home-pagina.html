<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/index.css">
    <title>INICIO</title>
</head>
<body>
    <main class="perfil_info">
        <header class="encabezado-principal s-6">
            <section>
                <a href="index.html" class="volver">
                    <i class="fa-solid fa-arrow-left"></i> Volver
                </a> 
                <h2>Información de perfil</h2>
            </section>
        </header>

        <section class="info-usuario">
            <img src="Imagenes/caficultor.jpg" alt="Foto caficultor" class="foto1 ">
            <article>
                <h3>José Caesar Martinez Gutierrez</h3>
            </article>
        </section>

        <hr>

        <section class="seccion-datos s-6"> 
            <header>
                <h4>Datos personales</h4>
            </header>

            <form class="campos container">
                <section class="s-12">
                    <label for="nombre">Nombre</label>
                    <input id="nombre" type="text" value="José Caesar">
                </section>

                <section class=" s-12">
                    <label for="apellido">Apellido</label>
                    <input id="apellido" type="text" value="Martinez Gutierrez">
                </section>

                <section class=" s-12">
                    <label for="teléfono">Teléfono</label>
                    <input id="teléfono" type="text" value="3214567890">
                </section>

                <section class="s-12">
                    <label for="municipio">Municipio</label>
                    <input id="municipio" type="text" value="Popayan">
                </section>

                <section class=" s-12">
                    <label for="gmail">Gmail</label>
                    <input id="gmail" type="email" value="josemartinez@gmail.com">
                </section>
            </form>

            <section class="seccion-finca"> 
            <header>
                <h4>Datos Finca</h4>
            </header>

            <form class="campos container">
                <section class=" s-12">
                    <label class="nombrefinca">Nombre finca</label>
                    <input id="nombrefinca" type="text" value="La Mulata">
                </section>

    <aside class="footer-bottom">
        <p>&copy; 2026 CoffeeTech. Todos los derechos reservados. Diseñado con tecnología para el café colombiano.</p>
    </aside>
</footer>

</body>
</html>
