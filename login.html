<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="Css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="Css/responsive.css">
</head>
<body class="login-page">

    <main class="login-wrapper">
        <article class="login-card">
            <header class="login-header">
                <a href="index.html" class="back-link">
                    <i class="fa-solid fa-arrow-left"></i> Volver
                </a>    
                <img src="Imagenes/logo2.png" alt="Coffee+visión Logo" class="login-logo">
                <h1>Bienvenido de nuevo</h1>
                <p>Ingresa tus credenciales para acceder a tu finca digital</p>
            </header>

            <form action="#" class="login-form" id="formLogin">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" autocomplete="off" required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="off" required>

                <label for="user-type">Tipo de usuario</label>
                <select id="user-type" name="user-type" required>
                    <option value="" disabled selected>Selecciona tu rol</option>
                    <option value="caficultor">Caficultor</option>
                    <option value="administrador">Administrador</option>
                </select>

                <fieldset class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="recordarme"> Recordarme
                    </label>
                    <a href="contrasena.html" class="forgot-pass">¿Olvidaste tu contraseña?</a>
                </fieldset>

                <button type="submit" class="btn-login-submit">Iniciar sesión</button>

                <footer class="login-card-footer">
                    <p>¿Aún no tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
                </footer>
            </form>
        </article>
    </main>
    
    <script>
        document.getElementById('formLogin').addEventListener('submit', function(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const selectedRole = document.getElementById('user-type').value;
            const users = JSON.parse(localStorage.getItem('coffeeUsers')) || [];
            const registeredUser = users.find(user => user.email === email && user.password === password);

            if (registeredUser && registeredUser.role !== selectedRole) {
                alert("El rol seleccionado no coincide con el usuario registrado.");
                return;
            }

            const role = registeredUser ? registeredUser.role : selectedRole;
            localStorage.setItem('coffeeActiveUser', JSON.stringify({
                email: email,
                role: role
            }));

            if (role === 'administrador') {
                window.location.href = 'dashboard-administrador.html';
                return;
            }

            window.location.href = 'dashboard-caficultor.html';
        });
    </script>
    <!-- hello -->

</body>
</html>
