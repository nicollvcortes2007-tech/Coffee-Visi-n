<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Coffee+visión</title>
    <link rel="stylesheet" href="/Css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-page">

    <main class="login-wrapper">
        <article class="login-card">
            <header class="login-header">
               <a href="index.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Volver
    </a>    
                <img src="/Imagenes/logo2.png" alt="Coffee+visión Logo" class="login-logo">
                <h1>Bienvenido de nuevo</h1>
                <p>Ingresa tus credenciales para acceder a tu finca digital</p>
            </header>

            <form action="#" class="login-form">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Recordarme
                    </label>
                    <a href="#" class="forgot-pass">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login-submit">Iniciar sesión</button>

                <footer class="login-card-footer">
                    <p>¿Aún no tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
                </footer>
            </form>
        </article>
    </main>

</body>
</html>
