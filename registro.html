<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Coffee+visión</title>
    <link rel="stylesheet" href="Css/registro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-page"> 
    <main class="login-wrapper">
        <article class="login-card">
            <header class="login-header">
                <a href="index.html" class="back-link">
                    <i class="fa-solid fa-arrow-left"></i> Volver
                </a>
                <img src="Imagenes/logo2.png" alt="Coffee+visión Logo" class="login-logo">
                <h1>Crear Cuenta</h1>
                <p>Completa tus datos para comenzar con CoffeeTech</p>
            </header>

            <form action="#" class="login-form" id="formRegistro">
                
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" autocomplete="off" required>

                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" autocomplete="off" required>

                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" placeholder="+57 300 123 4567" autocomplete="off" required>

                <label for="user-type">Tipo de Usuario</label>
                <select id="user-type" name="user-type" required>
                    <option value="" disabled selected>Selecciona una opción</option>
                    <option value="caficultor">Caficultor</option>
                    <option value="administrador">Administrador</option>
                </select>

                <label for="finca">Nombre de la Finca</label>
                <input type="text" id="finca" name="finca" placeholder="Ej: Finca El Paraíso" autocomplete="off" required>

                <label for="ubicacion">Ubicación</label>
                <input type="text" id="ubicacion" name="ubicacion" placeholder="Huila, Colombia" autocomplete="off" required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" minlength="8" autocomplete="off" required>

                <label for="confirm-password">Confirmar Contraseña</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Repite tu contraseña" autocomplete="off" required>

                <label class="remember-me">
                    <input type="checkbox" name="terminos" required> 
                    Acepto los términos y condiciones y la política de privacidad
                </label>

                <button type="submit" class="btn-login-submit">Crear Cuenta</button>

                <footer class="login-card-footer">
                    <p>¿Ya tienes cuenta? <a href="login.html">Inicia Sesión</a></p>
                </footer>
            </form>
        </article>
    </main>

    <script>
        document.getElementById('formRegistro').addEventListener('submit', function(event) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                alert("¡Ups! Las contraseñas no coinciden. Por favor, verifícalas.");
                event.preventDefault(); 
                return;
            }

            alert("¡Registro exitoso en CoffeeTech!");
        });
    </script>
</body>
</html>
