<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Coffee+visión</title>
    <link rel="stylesheet" href="/Css/registro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-page"> <main class="login-wrapper">
        <article class="login-card">
            <header class="login-header">
                <a href="index.html" class="back-link">
                    <i class="fa-solid fa-arrow-left"></i> Volver
                </a>
                <img src="/Imagenes/logo2.png" alt="Coffee+visión Logo" class="login-logo">
                <h1>Crear Cuenta</h1>
                <p>Completa tus datos para comenzar con CoffeeTech</p>
            </header>

            <form action="#" class="login-form">
                
                <div class="input-group">
                    <label for="nombre">Nombre Completo</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="nombre" placeholder="Tu nombre" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="telefono">Teléfono</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-phone"></i>
                        <input type="tel" id="telefono" placeholder="+57 300 123 4567" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="user-type">Tipo de Usuario</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-users-gear"></i>
                        <select id="user-type" required>
                            <option value="" disabled selected>Selecciona una opción</option>
                            <option value="caficultor">Caficultor</option>
                            <option value="administrador">Administrador</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="finca">Nombre de la Finca</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-seedling"></i>
                        <input type="text" id="finca" placeholder="Ej: Finca El Paraíso" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="ubicacion">Ubicación</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-location-dot"></i>
                        <input type="text" id="ubicacion" placeholder="Huila, Colombia" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Mínimo 8 caracteres" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirmar Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="confirm-password" placeholder="Repite tu contraseña" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" required> 
                        Acepto los términos y condiciones y la política de privacidad
                    </label>
                </div>

                <button type="submit" class="btn-login-submit">Crear Cuenta</button>

                <footer class="login-card-footer">
                    <p>¿Ya tienes cuenta? <a href="login.html">Inicia Sesión</a></p>
                </footer>
            </form>
        </article>
    </main>

</body>
</html>
